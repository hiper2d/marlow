# Marlow agent + model switchboard. Sourced by driver/tick.sh on every tick.
#
# Edit THIS file to change which backend Marlow runs on and which model each
# loop uses. No code changes needed - the driver reads it fresh each tick.
# Any value here can also be overridden per-run from the environment
# (e.g. `MARLOW_AGENT=codex bash driver/tick.sh writer`).
#
# ---------------------------------------------------------------------------
# Backend. "claude" is the ONLY operational backend today.
# "codex" is stubbed: the switch exists but tick.sh will refuse to run until
# (a) there's an OpenAI/Codex subscription and (b) tools/cost.py can parse
# Codex's `--json` event stream (its schema differs from Claude stream-json).
# See the CODEX WIRING NOTES at the bottom before enabling.
# ---------------------------------------------------------------------------
MARLOW_AGENT="${MARLOW_AGENT:-claude}"

# ---------------------------------------------------------------------------
# Model tiers. Two tiers, resolved per loop in tick.sh:
#   heavy -> writer loop + legacy no-profile loop (drafting, revising,
#            editorial reasoning - quality-sensitive)
#   light -> ops loop (crossposting, scraping, deterministic checks,
#            monitoring, commits - mechanical, cheap model is fine)
# Variable naming: MARLOW_MODEL_<TIER>_<AGENT>, both uppercased.
# ---------------------------------------------------------------------------

# Claude tiers (live)
MARLOW_MODEL_HEAVY_CLAUDE="${MARLOW_MODEL_HEAVY_CLAUDE:-claude-opus-4-8}"
MARLOW_MODEL_LIGHT_CLAUDE="${MARLOW_MODEL_LIGHT_CLAUDE:-claude-sonnet-5}"

# Codex tiers (placeholders - adjust once subscribed; see wiring notes)
MARLOW_MODEL_HEAVY_CODEX="${MARLOW_MODEL_HEAVY_CODEX:-gpt-5}"
MARLOW_MODEL_LIGHT_CODEX="${MARLOW_MODEL_LIGHT_CODEX:-gpt-5-mini}"

# ===========================================================================
# CODEX WIRING NOTES (do this when you actually flip to codex)
# ---------------------------------------------------------------------------
# 1. Subscription: `codex login` must succeed (CLI already installed, v0.42+).
# 2. tick.sh invocation: the claude command in tick.sh maps to codex as:
#        claude -p                         -> codex exec
#        --model "$MARLOW_MODEL"           -> -m "$MARLOW_MODEL"
#        --output-format stream-json       -> --json
#        --append-system-prompt "$(cat X)" -> NO equivalent flag. Write the
#            profile IDENTITY.md into an AGENTS.md in the working dir instead,
#            or point at a config.toml profile.
#        (autonomy)                        -> add --full-auto (Codex sandboxes
#            by default; Marlow writes across several project dirs).
#        stream capture                    -> --output-last-message "$RESULT..."
# 3. Cost tracking: tools/cost.py parses Claude stream-json. Codex `--json`
#    emits a DIFFERENT event schema, so `cost.py log` will read $0 / no tokens
#    until it grows a Codex branch. Without that, the month-long cost
#    comparison is blind. Wire this BEFORE trusting spend numbers.
# 4. Flip the guard: tick.sh currently hard-stops when MARLOW_AGENT != claude.
#    Remove/extend that guard once the above is done.
# ===========================================================================
