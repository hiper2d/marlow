# daily_calorie_digest — morning summary of the previous (closed) day.
#
# Fires each morning at 12:00 UTC (~07:00-08:00 America/New_York) and
# summarizes the most recent *fully-completed* EST day — never the day in
# progress. `due` only returns local days strictly before today (EST), so
# a day is closed only once it is actually over in Alex's timezone; any
# late-evening report is folded in before the digest goes out. Marlow
# writes a short honest comment and sends it to the fitness chat.
# Self-heals across missed mornings: `due` returns every undelivered past
# day, so a laptop asleep at digest time just catches up on the next tick.
#
# In-tick flow (full detail in CLAUDE.md → "Calorie tracking"):
#   1. uv run python handlers/calorie_digest.py due   → list of dates.
#   2. For each date: estimate any still-pending entries first (so totals
#      don't undercount), then `summary --date <d>`, compose the message,
#      `send --date <d> --text "<message>"`.
#   3. If `due` is empty, nothing to send — exit clean.
#
# must_run_within_hours large enough to catch up after an overnight sleep.
name: daily_calorie_digest
project: calories
description: Send Alex an end-of-day calorie + macro summary with a short comment.
schedule: "0 12 * * *"   # ~07:00-08:00 ET — morning, prior day fully closed
priority: high
must_run_within_hours: 18
subtasks:
  - id: send_digest
    handler: calorie_digest
    context: {}
