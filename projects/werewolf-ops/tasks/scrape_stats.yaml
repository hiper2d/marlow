# scrape_stats — console scraping for the 3 Werewolf providers with no usable
# balance/cost API (so they can't ride monitor_keys):
#   - GLM / Z.AI : cash + credits balance        (a real depleting balance)
#   - Gemini     : spend vs. $250 billing tier cap (postpaid)
#   - Mistral    : month usage vs. $30 spending limit (postpaid; + pending)
#
# Once daily — these move slower than the free-tier balance keys, and each run
# drives a headless Chrome (~40s), so twice-daily isn't worth it.
#
# Mechanism: a DEDICATED persistent Chrome profile (port 9223) that Alex logged
# into once; the handler runs it headless and reuses the cookies. Driving goes
# through simona's browser CLI (CDP_PORT=9223). HTML scrapes are fragile by
# nature — a console redesign breaks an extractor. Failures are explicit:
#   - reauth      (login wall, session expired)  → urgent
#   - parse_failed (number not found / layout changed) → digest
#   - chrome_down (profile unreachable)          → urgent
# Never a silent wrong number.
#
# RE-AUTH RUNBOOK (when Marlow reports a `reauth` issue):
#   1. Kill the headless instance:  pkill -f "user-data-dir=$HOME/.config/marlow/scrape-profile"
#   2. Launch headful:  bash <simona>/mcp/browser/start-chrome-persistent.sh 9223
#   3. Log back into the flagged console in that window, then quit it.
#   4. Next tick relaunches headless and reuses the refreshed cookies.
#
# In-tick flow:
#   1. Run `uv run python handlers/scrape_stats.py report`.
#   2. Parse JSON. Write it to projects/werewolf-ops/reports/scrape/<YYYY-MM-DD>.md.
#   3. If any_urgent (reauth / near_cap >=95% / balance_critical / chrome_down),
#      send one consolidated urgent Telegram. For reauth, include the runbook.
#   4. Else if digest-severity issues (balance_low, approaching_cap, parse_failed),
#      append a digest line.
#   5. If clean, append a one-line digest: "Scraped: GLM $X, Gemini $Y/$cap,
#      Mistral $Z/$limit — all healthy."
#   6. Write the tick result and exit.
name: scrape_stats
project: werewolf-ops
profile: ops
description: Daily console scrape of the 3 no-API Werewolf providers (GLM balance, Gemini + Mistral spend-vs-cap) via a logged-in headless Chrome.
schedule: "0 9 * * *"
priority: normal
must_run_within_hours: 12
subtasks:
  - id: scrape_consoles
    handler: scrape_stats
    context: {}
