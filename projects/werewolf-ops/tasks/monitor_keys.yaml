# monitor_keys — low-balance watch for the Werewolf free-tier API keys.
#
# Fires twice daily (08:00 + 20:00 UTC). A public free tier can drain a key
# fast, so once-a-day risks missing an empty key for ~24h.
#
# Covers 5 of the 8 providers, two ways:
#
# Tier 1 — direct balance API (provider hands us remaining; zero maintenance):
#   - DeepSeek  (GET /user/balance)
#   - Moonshot  (GET /v1/users/me/balance)
#   - xAI/Grok  (management API; balance = invoice/preview, NOT the raw ledger)
#
# Tier 2 — cost API + console baseline (no balance endpoint exists, so
# remaining = a baseline Alex reads from the console once, minus cumulative
# spend since, from the provider's admin cost API). Works for shared accounts
# because the cost API counts ALL spend, not just the game's:
#   - OpenAI    (GET /v1/organization/costs, admin key)
#   - Anthropic (GET /v1/organizations/cost_report, admin key; COMPLETED 1d
#                buckets only — same-day baseline reads spend 0 until tomorrow)
# Game-spend estimation was rejected: provider budgets are shared across Alex's
# other projects, so game spend != total spend. Baselines live in
# projects/werewolf-ops/config/tier2_baselines.json; update on each top-up via
# `monitor_keys.py set-baseline <provider> <remaining_usd>`.
# The remaining 3 (Google, Mistral, GLM/Z.AI) are deferred — different billing
# models (GCP billing / postpaid / subscription-quota), not a draining balance.
#
# Credentials (all in the launchd plist):
#   - MARLOW_FIREBASE_CREDS → path to the dedicated read-only service-account
#     JSON (marlow-readonly@…, roles/datastore.viewer; all writes denied by
#     IAM), at ~/.config/marlow/marlow-readonly.json. Reads /config/freeTierApiKeys.
#   - XAI_MGMT_KEY + XAI_TEAM_ID → xAI management key (Billing read-only) + team id.
#   - OPENAI_ADMIN_KEY, ANTHROPIC_ADMIN_KEY → org admin keys (cost/usage scope;
#     NOT inference keys). Marlow monitoring infra → env, not Firestore.
#   - DeepSeek/Moonshot provider keys are read live from Firestore — never env.
#
# Alert behavior (Marlow's session interprets the handler's `issues` array):
#   - severity: urgent → marlow notify. Reserved for: a key that's dry
#     (balance_empty), critically low (< $3), or a 401/403 on the balance
#     call (key revoked).
#   - severity: digest → append to today's digest. Used for low-but-not-
#     critical balances (< $10) and transient balance-check failures.
#
# In-tick flow:
#   1. Run `uv run python handlers/monitor_keys.py report`.
#   2. Parse the JSON. If `ok: false` (every provider failed to read — almost
#      always MARLOW_FIREBASE_CREDS missing/invalid or firebase-admin absent),
#      treat as a framework bug: record a diagnosis via framework_fix, and
#      notify Alex urgent only if it's the Firestore creds failing.
#   3. Write the report to projects/werewolf-ops/reports/keys/<YYYY-MM-DD>.md.
#   4. If `any_urgent: true`, send one consolidated urgent Telegram listing
#      each empty/critical key and its balance. If only digest-severity
#      issues, append a single digest entry.
#   5. If no issues, append a one-line digest listing each provider + balance,
#      e.g. "Werewolf keys: DeepSeek $X, Moonshot $Y, Grok $Z, OpenAI $A,
#      Anthropic $B — all healthy."
#   6. Write the tick result and exit.
#
# Note on Tier-2 staleness: if an OpenAI/Anthropic baseline goes stale (Alex
# topped up but didn't re-anchor), remaining will trend negative and trip a
# false "empty" — that's the signal to re-run set-baseline, not a real outage.
name: monitor_keys
project: werewolf-ops
description: Twice-daily low-balance watch for 5 Werewolf provider keys — DeepSeek, Moonshot, xAI/Grok (balance API) + OpenAI, Anthropic (cost API − baseline).
schedule: "0 8,20 * * *"
priority: normal
must_run_within_hours: 6
subtasks:
  - id: check_balances
    handler: monitor_keys
    context: {}
