# monitor_self — Marlow's daily operational self-audit.
#
# Fires daily at 08:00 UTC. Checks invariants about Marlow's OWN operation
# (not external resources) and escalates failures. Built after the early-June
# 2026 blog stall, where a held draft, an empty thread page, and a dead curate
# slot were all observed in working.md but none reached Alex.
#
# The escalation is DETERMINISTIC and lives in the handler, not in this
# session: handlers/monitor_self.py calls notify_alex(urgency="urgent")
# itself for any urgent issue. The session does not get to decide whether to
# alert — that judgment step is what failed before. The session's only job is
# to run the script.
#
# Checks (see the handler docstring):
#   - scheduler_freshness  a scheduled tick has silently stopped firing  → urgent
#   - held_artifacts       a draft has been status:held past 48h         → urgent
#   - site_integrity       active thread with 0 posts / posts: drift     → digest
#
# In-tick flow:
#   1. Run `uv run python handlers/monitor_self.py report`.
#   2. The handler has already sent Telegram (urgent + digest) and written
#      projects/_framework/reports/self-audit/<YYYY-MM-DD>.md. Do NOT re-send.
#   3. Parse the JSON. If `ok: false`, a check crashed — the audit itself is
#      broken; record a framework_fix diagnosis (the handler already paged Alex).
#   4. If `any_urgent: true`, add a one-line note to memory/working.md so the
#      grader carries the open item forward until it's resolved.
#   5. Record the tick result and exit.
name: monitor_self
project: _framework
description: Daily operational self-audit — scheduler freshness, held drafts, site integrity.
schedule: "0 8 * * *"
priority: high
must_run_within_hours: 12
subtasks:
  - id: self_audit
    handler: monitor_self
    context: {}
